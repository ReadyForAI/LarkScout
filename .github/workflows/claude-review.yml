name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    # Run on new/updated PRs, or when someone comments "@claude" on a PR
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          # Use ONE of the following (delete the other):

          # Option A: Anthropic Console API key (pay-per-use)
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Option B: Claude Pro/Max OAuth token (subscription quota)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
