
services:
  larkscout:
    build: .
    ports:
      - "9898:9898"
    volumes:
      - ${LARKSCOUT_HOST_DOCS_DIR:-${HOME}/.larkscout/docs}:/root/.larkscout/docs
    environment:
      LARKSCOUT_DOCS_DIR: /root/.larkscout/docs
      # LLM provider (default: gemini)
      LARKSCOUT_LLM_PROVIDER: ${LARKSCOUT_LLM_PROVIDER:-gemini}
      LARKSCOUT_LLM_VENDOR: ${LARKSCOUT_LLM_VENDOR:-openai}
      # Gemini / Google AI credentials
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # OpenAI-compatible provider settings (used when LARKSCOUT_LLM_PROVIDER=openai)
      LARKSCOUT_LLM_API_KEY: ${LARKSCOUT_LLM_API_KEY:-}
      LARKSCOUT_LLM_BASE_URL: ${LARKSCOUT_LLM_BASE_URL:-https://api.openai.com/v1}
      LARKSCOUT_LLM_MODEL: ${LARKSCOUT_LLM_MODEL:-}
      LARKSCOUT_OCR_MODEL: ${LARKSCOUT_OCR_MODEL:-}
      LARKSCOUT_OCR_IMAGE_INPUT_MODE: ${LARKSCOUT_OCR_IMAGE_INPUT_MODE:-}
      LARKSCOUT_LLM_EXTRA_BODY_JSON: ${LARKSCOUT_LLM_EXTRA_BODY_JSON:-}
      LARKSCOUT_OCR_EXTRA_BODY_JSON: ${LARKSCOUT_OCR_EXTRA_BODY_JSON:-}
      LARKSCOUT_DOC_ID_STRATEGY: ${LARKSCOUT_DOC_ID_STRATEGY:-counter}
      LARKSCOUT_MAX_CONCURRENT_PARSE: ${LARKSCOUT_MAX_CONCURRENT_PARSE:-2}
      LARKSCOUT_LOCAL_OCR_CONCURRENCY: ${LARKSCOUT_LOCAL_OCR_CONCURRENCY:-1}
      LARKSCOUT_PREWARM_LOCAL_OCR: ${LARKSCOUT_PREWARM_LOCAL_OCR:-true}
      LARKSCOUT_DEFERRED_SUMMARY_MAX_CONCURRENT: ${LARKSCOUT_DEFERRED_SUMMARY_MAX_CONCURRENT:-1}
      LARKSCOUT_SUMMARY_BATCH_CONCURRENCY: ${LARKSCOUT_SUMMARY_BATCH_CONCURRENCY:-1}
      LARKSCOUT_SUMMARY_REQUEST_MIN_INTERVAL_SEC: ${LARKSCOUT_SUMMARY_REQUEST_MIN_INTERVAL_SEC:-2.0}
      LARKSCOUT_SUMMARY_SECTION_DETAIL_LIMIT: ${LARKSCOUT_SUMMARY_SECTION_DETAIL_LIMIT:-10}
    restart: unless-stopped
