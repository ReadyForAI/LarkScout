version: "3.9"

services:
  larkscout:
    build: .
    ports:
      - "9898:9898"
    volumes:
      - ./docs:/app/docs  # volume: docs/ persisted outside the container
    environment:
      # LLM provider (default: gemini)
      LARKSCOUT_LLM_PROVIDER: ${LARKSCOUT_LLM_PROVIDER:-gemini}
      # Gemini / Google AI credentials
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # OpenAI-compatible provider settings (used when LARKSCOUT_LLM_PROVIDER=openai)
      LARKSCOUT_LLM_API_KEY: ${LARKSCOUT_LLM_API_KEY:-}
      LARKSCOUT_LLM_BASE_URL: ${LARKSCOUT_LLM_BASE_URL:-https://api.openai.com/v1}
      LARKSCOUT_LLM_MODEL: ${LARKSCOUT_LLM_MODEL:-}
    restart: unless-stopped
